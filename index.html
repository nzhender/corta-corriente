<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Control de Corta Corriente</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-grad-1: #0f172a;
    --bg-grad-2: #1e293b;
    --card-bg: rgba(255, 255, 255, 0.06);
    --card-border: rgba(255, 255, 255, 0.1);
    --text: #f1f5f9;
    --text-dim: #94a3b8;
    --accent: #3b82f6;
    --success: #10b981;
    --danger: #ef4444;
    --warning: #f59e0b;
    --shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  .app {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .header {
    text-align: center;
    padding: 8px 0 4px;
  }

  .header h1 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .header p {
    color: var(--text-dim);
    font-size: 14px;
    margin-top: 4px;
  }

  .card {
    background: var(--card-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 24px;
    box-shadow: var(--shadow);
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .input-group label {
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .input-row {
    display: flex;
    gap: 8px;
  }

  input[type="text"] {
    flex: 1;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 16px;
    color: var(--text);
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.2s;
    text-align: center;
    font-family: "SF Mono", Monaco, monospace;
  }

  input[type="text"]:focus {
    outline: none;
    border-color: var(--accent);
    background: rgba(0, 0, 0, 0.4);
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
  }

  input.invalid {
    border-color: var(--danger);
    box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
  }

  .hint {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .hint.error {
    color: var(--danger);
  }

  .status {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: rgba(0, 0, 0, 0.25);
    border-radius: 12px;
    margin-top: 16px;
    border: 1px solid var(--card-border);
  }

  .status-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
    box-shadow: 0 0 0 4px rgba(148, 163, 184, 0.15);
  }

  .status-dot.active {
    background: var(--danger);
    box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.2);
    animation: pulse 2s infinite;
  }

  .status-dot.inactive {
    background: var(--success);
    box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.2);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .status-text {
    font-size: 14px;
    flex: 1;
  }

  .status-text strong {
    display: block;
    font-size: 15px;
  }

  .status-text span {
    color: var(--text-dim);
    font-size: 12px;
  }

  .button-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 20px;
  }

  button {
    border: none;
    border-radius: 14px;
    padding: 18px 16px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    font-family: inherit;
  }

  button:active:not(:disabled) {
    transform: scale(0.97);
  }

  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  button .icon {
    font-size: 22px;
  }

  .btn-activate {
    background: linear-gradient(135deg, #ef4444, #dc2626);
    box-shadow: 0 8px 16px rgba(239, 68, 68, 0.25);
  }

  .btn-activate:hover:not(:disabled) {
    box-shadow: 0 12px 20px rgba(239, 68, 68, 0.35);
  }

  .btn-deactivate {
    background: linear-gradient(135deg, #10b981, #059669);
    box-shadow: 0 8px 16px rgba(16, 185, 129, 0.25);
  }

  .btn-deactivate:hover:not(:disabled) {
    box-shadow: 0 12px 20px rgba(16, 185, 129, 0.35);
  }

  .history {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }

  .history-header h2 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    font-weight: 600;
  }

  .clear-btn {
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    box-shadow: none;
  }

  .clear-btn:hover {
    color: var(--text);
    background: rgba(255, 255, 255, 0.05);
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 300px;
    overflow-y: auto;
  }

  .history-empty {
    color: var(--text-dim);
    font-size: 13px;
    text-align: center;
    padding: 24px 0;
  }

  .history-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    background: rgba(0, 0, 0, 0.2);
    border-radius: 10px;
    border: 1px solid var(--card-border);
  }

  .history-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .history-icon.activate {
    background: rgba(239, 68, 68, 0.15);
    color: var(--danger);
  }

  .history-icon.deactivate {
    background: rgba(16, 185, 129, 0.15);
    color: var(--success);
  }

  .history-info {
    flex: 1;
    min-width: 0;
  }

  .history-info .plate {
    font-family: "SF Mono", Monaco, monospace;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.5px;
  }

  .history-info .meta {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 100;
  }

  .modal-backdrop.show {
    display: flex;
  }

  .modal {
    background: #1e293b;
    border: 1px solid var(--card-border);
    border-radius: 20px;
    padding: 28px;
    max-width: 380px;
    width: 100%;
    text-align: center;
  }

  .modal-icon {
    font-size: 48px;
    margin-bottom: 12px;
  }

  .modal h3 {
    font-size: 20px;
    margin-bottom: 8px;
  }

  .modal p {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 20px;
  }

  .modal .plate-display {
    font-family: "SF Mono", Monaco, monospace;
    font-weight: 700;
    font-size: 22px;
    color: var(--text);
    letter-spacing: 2px;
    background: rgba(0, 0, 0, 0.3);
    padding: 12px;
    border-radius: 10px;
    margin: 16px 0;
  }

  .modal-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 20px;
  }

  .btn-cancel {
    background: rgba(255, 255, 255, 0.08);
    color: var(--text);
    box-shadow: none;
  }

  .btn-confirm-activate {
    background: linear-gradient(135deg, #ef4444, #dc2626);
  }

  .btn-confirm-deactivate {
    background: linear-gradient(135deg, #10b981, #059669);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #1e293b;
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 14px 20px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    font-weight: 500;
    transition: transform 0.3s ease;
    z-index: 200;
    max-width: 90%;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  .toast.success { border-color: var(--success); }
  .toast.error { border-color: var(--danger); }
</style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Control de Corta Corriente</h1>
      <p>Ingresá la patente del vehículo</p>
    </div>

    <div class="card">
      <div class="input-group">
        <label for="patente">Patente</label>
        <div class="input-row">
          <input
            type="text"
            id="patente"
            placeholder="AA123BB"
            maxlength="7"
            autocomplete="off"
            autocapitalize="characters"
            spellcheck="false"
          />
        </div>
        <div class="hint" id="hint">Formato: AA123BB (nuevo) o ABC123 (anterior)</div>
      </div>

      <div class="status">
        <div class="status-dot" id="statusDot"></div>
        <div class="status-text">
          <strong id="statusTitle">Sin patente</strong>
          <span id="statusSub">Ingresá una patente para ver su estado</span>
        </div>
      </div>

      <div class="button-row">
        <button class="btn-activate" id="btnActivate" disabled>
          <span class="icon">🔒</span>
          <span>Activar</span>
        </button>
        <button class="btn-deactivate" id="btnDeactivate" disabled>
          <span class="icon">🔓</span>
          <span>Desactivar</span>
        </button>
      </div>
    </div>

    <div class="card history">
      <div class="history-header">
        <h2>Historial</h2>
        <button class="clear-btn" id="clearBtn">Limpiar</button>
      </div>
      <div class="history-list" id="historyList">
        <div class="history-empty">Aún no hay acciones registradas</div>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="modal">
    <div class="modal">
      <div class="modal-icon" id="modalIcon">⚠️</div>
      <h3 id="modalTitle">¿Confirmar acción?</h3>
      <p id="modalText">Estás por aplicar el corta corriente al siguiente vehículo:</p>
      <div class="plate-display" id="modalPlate">AA123BB</div>
      <div class="modal-buttons">
        <button class="btn-cancel" id="btnCancel">Cancelar</button>
        <button id="btnConfirm">Confirmar</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY_HISTORY = 'cc_history';
  const STORAGE_KEY_STATES = 'cc_states';

  const patenteInput = document.getElementById('patente');
  const hint = document.getElementById('hint');
  const btnActivate = document.getElementById('btnActivate');
  const btnDeactivate = document.getElementById('btnDeactivate');
  const statusDot = document.getElementById('statusDot');
  const statusTitle = document.getElementById('statusTitle');
  const statusSub = document.getElementById('statusSub');
  const historyList = document.getElementById('historyList');
  const clearBtn = document.getElementById('clearBtn');

  const modal = document.getElementById('modal');
  const modalIcon = document.getElementById('modalIcon');
  const modalTitle = document.getElementById('modalTitle');
  const modalText = document.getElementById('modalText');
  const modalPlate = document.getElementById('modalPlate');
  const btnCancel = document.getElementById('btnCancel');
  const btnConfirm = document.getElementById('btnConfirm');
  const toast = document.getElementById('toast');

  let pendingAction = null;

  // Validation: AR plate formats
  // New (Mercosur): AA123BB
  // Old: ABC123
  const NEW_FORMAT = /^[A-Z]{2}\d{3}[A-Z]{2}$/;
  const OLD_FORMAT = /^[A-Z]{3}\d{3}$/;

  function isValidPlate(plate) {
    return NEW_FORMAT.test(plate) || OLD_FORMAT.test(plate);
  }

  function getStates() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY_STATES) || '{}');
    } catch { return {}; }
  }

  function setState(plate, active) {
    const states = getStates();
    states[plate] = { active, updated: Date.now() };
    localStorage.setItem(STORAGE_KEY_STATES, JSON.stringify(states));
  }

  function getHistory() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY_HISTORY) || '[]');
    } catch { return []; }
  }

  function addHistory(plate, action) {
    const items = getHistory();
    items.unshift({ plate, action, ts: Date.now() });
    const limited = items.slice(0, 50);
    localStorage.setItem(STORAGE_KEY_HISTORY, JSON.stringify(limited));
    renderHistory();
  }

  function clearHistory() {
    localStorage.removeItem(STORAGE_KEY_HISTORY);
    renderHistory();
  }

  function formatTime(ts) {
    const d = new Date(ts);
    const today = new Date();
    const sameDay = d.toDateString() === today.toDateString();
    const time = d.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
    if (sameDay) return `Hoy ${time}`;
    return d.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit' }) + ' ' + time;
  }

  function renderHistory() {
    const items = getHistory();
    if (items.length === 0) {
      historyList.innerHTML = '<div class="history-empty">Aún no hay acciones registradas</div>';
      return;
    }
    historyList.innerHTML = items.map(item => `
      <div class="history-item">
        <div class="history-icon ${item.action}">
          ${item.action === 'activate' ? '🔒' : '🔓'}
        </div>
        <div class="history-info">
          <div class="plate">${item.plate}</div>
          <div class="meta">
            ${item.action === 'activate' ? 'Activado' : 'Desactivado'} · ${formatTime(item.ts)}
          </div>
        </div>
      </div>
    `).join('');
  }

  function updateStatus() {
    const plate = patenteInput.value.trim().toUpperCase();
    const isEmpty = plate.length === 0;
    const isValid = isValidPlate(plate);

    // Hint
    patenteInput.classList.remove('invalid');
    if (isEmpty) {
      hint.textContent = 'Formato: AA123BB (nuevo) o ABC123 (anterior)';
      hint.classList.remove('error');
    } else if (!isValid) {
      hint.textContent = 'Patente inválida. Usá AA123BB o ABC123.';
      hint.classList.add('error');
      patenteInput.classList.add('invalid');
    } else {
      hint.textContent = 'Patente válida';
      hint.classList.remove('error');
    }

    // Status indicator
    statusDot.classList.remove('active', 'inactive');
    if (!isValid) {
      statusTitle.textContent = isEmpty ? 'Sin patente' : 'Patente inválida';
      statusSub.textContent = isEmpty
        ? 'Ingresá una patente para ver su estado'
        : 'Corregí el formato para continuar';
      btnActivate.disabled = true;
      btnDeactivate.disabled = true;
      return;
    }

    const states = getStates();
    const state = states[plate];
    if (!state) {
      statusTitle.textContent = 'Sin registro';
      statusSub.textContent = 'No hay acciones previas para esta patente';
      btnActivate.disabled = false;
      btnDeactivate.disabled = false;
    } else if (state.active) {
      statusDot.classList.add('active');
      statusTitle.textContent = 'Corta corriente ACTIVADO';
      statusSub.textContent = 'Última acción: ' + formatTime(state.updated);
      btnActivate.disabled = true;
      btnDeactivate.disabled = false;
    } else {
      statusDot.classList.add('inactive');
      statusTitle.textContent = 'Corta corriente DESACTIVADO';
      statusSub.textContent = 'Última acción: ' + formatTime(state.updated);
      btnActivate.disabled = false;
      btnDeactivate.disabled = true;
    }
  }

  function showToast(msg, type = 'success') {
    toast.className = 'toast ' + type;
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2600);
  }

  function openModal(action) {
    const plate = patenteInput.value.trim().toUpperCase();
    if (!isValidPlate(plate)) return;
    pendingAction = { action, plate };

    if (action === 'activate') {
      modalIcon.textContent = '🔒';
      modalTitle.textContent = '¿Activar corta corriente?';
      modalText.textContent = 'Vas a APAGAR el motor / cortar la corriente del siguiente vehículo:';
      btnConfirm.textContent = 'Sí, activar';
      btnConfirm.className = 'btn-confirm-activate';
    } else {
      modalIcon.textContent = '🔓';
      modalTitle.textContent = '¿Desactivar corta corriente?';
      modalText.textContent = 'Vas a RESTAURAR la corriente del siguiente vehículo:';
      btnConfirm.textContent = 'Sí, desactivar';
      btnConfirm.className = 'btn-confirm-deactivate';
    }
    modalPlate.textContent = plate;
    modal.classList.add('show');
  }

  function closeModal() {
    modal.classList.remove('show');
    pendingAction = null;
  }

  function executePending() {
    if (!pendingAction) return;
    const { action, plate } = pendingAction;
    setState(plate, action === 'activate');
    addHistory(plate, action);
    closeModal();
    updateStatus();
    showToast(
      action === 'activate'
        ? `Corta corriente ACTIVADO en ${plate}`
        : `Corta corriente DESACTIVADO en ${plate}`,
      'success'
    );
  }

  // Events
  patenteInput.addEventListener('input', (e) => {
    e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
    updateStatus();
  });

  btnActivate.addEventListener('click', () => openModal('activate'));
  btnDeactivate.addEventListener('click', () => openModal('deactivate'));
  btnCancel.addEventListener('click', closeModal);
  btnConfirm.addEventListener('click', executePending);

  modal.addEventListener('click', (e) => {
    if (e.target === modal) closeModal();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && modal.classList.contains('show')) closeModal();
  });

  clearBtn.addEventListener('click', () => {
    if (getHistory().length === 0) return;
    if (confirm('¿Borrar todo el historial?')) {
      clearHistory();
      showToast('Historial borrado');
    }
  });

  // Init
  renderHistory();
  updateStatus();
  patenteInput.focus();
</script>
</body>
</html>
